            <div id="SignUp-div" style="display: none;">
                <form action="home.html">

                    <h1>Create Account</h1>
                    <label for="signup-user">Your name</label>
                    <input type="text" id="signup-user" placeholder="username" required>
                    
                    <label for="signup-email">Your email</label>
                    <input type="email" id="signup-email" placeholder="example@gmail.com" required>
                    
                    <label for="signup-pass">Create your password</label>
                    
                    <div class="password-wrapper">
                        <span class="toggle-eye" data-target="signup-pass">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>

                    <button type="submit" id="SignUp">Create Account</button>
